<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Ticket Booking</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: grey;
        display: flex;
        justify-content: center;
        padding-top: 50px;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        width: 400px;
    }

    h2 {
        text-align: center;
        color: #333;
    }

    label {
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: light pink;
    }

    .result {
        margin-top: 20px;
        padding: 10px;
        background: skyblue;
        border-radius: 5px;
        display: none;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Online Ticket Booking</h2>

    <label>Name</label>
    <input type="text" id="name" placeholder="name please">

    <label>Select Event</label>
    <select id="event">
        <option value="200">Movie A - ₹200</option>
        <option value="300">Movie B - ₹300</option>
        <option value="500">Concert - ₹500</option>
        <option value="1000">VIP Show - ₹1000</option>
    </select>

    <label>How many tickets do you want</label>
    <input type="number" id="tickets" min="1" value="1">

    <button onclick="bookTicket()"> ok! Book Now</button>

    <div class="result" id="result"></div>
</div>
</html>

<script>
function bookTicket() {
    let name = document.getElementById("name").value;

    let eventSelect = document.getElementById("event");
    let eventPrice = parseInt(eventSelect.value);
    let eventName = eventSelect.options[eventSelect.selectedIndex].text;

    let tickets = parseInt(document.getElementById("tickets").value);

    if (name === "") {
        alert("Please enter your name");
        return;
    }

    let totalAmount = eventPrice * tickets;
    let bookingId = "BK" + Math.floor(Math.random() * 100000);

    let result = document.getElementById("result");
    result.style.display = "block";

    result.innerHTML = `
        <h3>Booking Confirmed!</h3>
        <p><strong>Booking ID:</strong> ${bookingId}</p>
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Event:</strong> ${eventName}</p>
        <p><strong>Tickets:</strong> ${tickets}</p>
        <p><strong>Total Amount:</strong> ₹${totalAmount}</p>
    `;
}
</script>
